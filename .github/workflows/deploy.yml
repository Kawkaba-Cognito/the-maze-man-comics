name: Deploy to GitHub Pages

# Primary deploy path: every push to main builds on a clean runner and
# publishes dist/ to the gh-pages branch (the branch GitHub Pages serves —
# repo Pages config is "Deploy from a branch", build_type "legacy"; this
# workflow deliberately keeps that config instead of the Actions-artifact
# flow, so the manual worktree deploy in CLAUDE.md still works as a fallback).
# Plain git only — no third-party actions in the publish step.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # push the built site to the gh-pages branch

concurrency:
  group: pages-deploy
  cancel-in-progress: false # never kill a deploy mid-push; queue the next one

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Audit FocusQuest level math & generation
        run: npm run audit:fq

      - name: Validate rush-hour reference solutions
        run: npm run validate:rh

      - name: Build
        run: npm run build

      - name: Publish dist/ to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git worktree add /tmp/site origin/gh-pages
          # gh-pages holds ONLY the built site, so wiping everything except
          # .git and copying dist/. in is an exact mirror of the build.
          find /tmp/site -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -r dist/. /tmp/site/
          cd /tmp/site
          git add -A
          if git diff --cached --quiet; then
            echo "Build is identical to the live site — nothing to deploy."
          else
            git commit -m "Deploy: built from ${GITHUB_SHA}"
            git push origin HEAD:gh-pages
          fi
