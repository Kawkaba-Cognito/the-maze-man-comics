<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Content-Security-Policy (defence-in-depth). GitHub Pages can't set HTTP
       headers, so it ships as a meta tag. Scope is exactly what the app loads:
       self + Google Fonts (styles/fonts) + the Babylon CDN (3D maze, SRI-pinned)
       + cdnjs (Three.js for Void Runner, also SRI-pinned, loaded on demand).
       'unsafe-inline' style is required by Google Fonts + React inline styles;
       'unsafe-eval' is required by Babylon.js (shader / node-material code paths
       use Function()); it is scoped to script-src and the app takes no untrusted
       input, so the residual risk is low. object-src/base-uri stay locked down. -->
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-eval' https://cdn.babylonjs.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' blob: https://cdn.babylonjs.com https://fonts.googleapis.com https://fonts.gstatic.com; worker-src 'self' blob:; manifest-src 'self'; base-uri 'self'; object-src 'none'"
  />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>The Maze Man | Psychological Comics</title>

  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet" />

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Cinzel:wght@500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet" />
  <!-- Babylon.js (the 3D maze engine, several MB) is NOT loaded here. A blocking
       <script> made it parse + execute on every launch — ~2.5s of frozen boot
       even on screens that never use 3D. It is now loaded on demand in
       AppContext.requestMazeEntry (pinned version + SRI) when the player enters
       the maze. Preconnect so that on-demand fetch starts fast. -->
  <link rel="preconnect" href="https://cdn.babylonjs.com" crossorigin />
